<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #07090e;
  --panel:     #0d1018;
  --panel2:    #131720;
  --panel3:    #181d28;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.1);
  --gold:      #c9913a;
  --gold2:     #e8b55a;
  --gold-glow: rgba(201,145,58,0.12);
  --text:      #d8dde8;
  --dim:       #8892a4;
  --muted:     #454d5e;
  --win:       #2e7d52;
  --win-text:  #4ebe82;
  --draw:      #3a4155;
  --draw-text: #7a8499;
  --loss:      #7d2e2e;
  --loss-text: #e06060;
  --live:      #e84b4b;
  --upcoming:  #3a5c9e;
  --today-bg:  rgba(58,92,158,0.08);
  --today-bdr: rgba(58,92,158,0.3);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, #0f1520 0%, var(--panel) 100%);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 20;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.trophy-wrap {
  width: 34px; height: 34px;
  background: var(--gold-glow);
  border: 1px solid rgba(201,145,58,0.25);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
}
.title-block .t1 {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
}
.title-block .t2 {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.3px;
}
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-size: 9px; color: var(--muted); }
.refresh-btn {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  background: var(--panel2);
  border: 1px solid var(--border2);
  color: var(--dim);
  padding: 4px 10px;
  border-radius: 4px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* ── Tabs ── */
.tabs {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  gap: 0;
}
.tab {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 9px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  border-top: none; border-left: none; border-right: none;
  background: none; outline: none;
  transition: color 0.15s;
}
.tab:hover { color: var(--dim); }
.tab.active { color: var(--gold2); border-bottom-color: var(--gold); }

/* ── Content ── */
.content {
  padding: 10px 16px 24px;
  max-height: calc(100vh - 80px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.08) transparent;
}
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

/* ── State ── */
.state {
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
}
.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-label {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Round filter ── */
.round-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}
.rf-btn {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 3px 9px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.12s;
  white-space: nowrap;
}
.rf-btn:hover { color: var(--dim); border-color: rgba(255,255,255,0.12); }
.rf-btn.active { background: var(--gold-glow); border-color: rgba(201,145,58,0.35); color: var(--gold2); }

/* ── Date section ── */
.date-section { margin-bottom: 2px; }
.date-hdr {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--gold);
  padding: 8px 2px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-hdr::after { content:''; flex:1; height:1px; background:var(--border); }
.date-hdr.today-hdr { color: #6fa3e8; }
.date-hdr.today-hdr::after { background: var(--today-bdr); }

/* ── Match row ── */
.match {
  display: grid;
  grid-template-columns: 30px 1fr 54px 1fr 64px;
  align-items: center;
  gap: 4px;
  padding: 5px 8px;
  border-radius: 5px;
  margin-bottom: 2px;
  border: 1px solid transparent;
  transition: background 0.1s;
  cursor: default;
}
.match:hover { background: rgba(255,255,255,0.025); }
.match.is-today { background: var(--today-bg); border-color: var(--today-bdr); }
.match.is-live { background: rgba(232,75,75,0.05); border-color: rgba(232,75,75,0.18); }
.match.is-done { opacity: 0.65; }

.m-grp {
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  text-align: center;
  line-height: 1.2;
}
.m-team {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 400;
  color: var(--text);
  min-width: 0;
}
.m-team.away { flex-direction: row-reverse; }
.m-team .flag { font-size: 14px; flex-shrink: 0; line-height: 1; }
.m-team .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.m-team.winner .name { color: #fff; font-weight: 600; }

.m-score {
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  letter-spacing: 1px;
}
.m-score.upcoming {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0;
}
.m-score .live-dot {
  display: inline-block;
  width: 5px; height: 5px;
  background: var(--live);
  border-radius: 50%;
  margin-right: 3px;
  vertical-align: middle;
  animation: blink 1.1s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.m-score .score-sep { color: var(--muted); margin: 0 2px; font-weight: 300; }

.m-meta {
  text-align: right;
  font-size: 9px;
  color: var(--muted);
  line-height: 1.6;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.m-meta .city { color: #2d3345; font-size: 9px; }
.status-tag {
  display: inline-block;
  font-family: 'Oswald', sans-serif;
  font-size: 8px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 3px;
}
.tag-ft   { background: rgba(70,80,100,0.3); color: var(--muted); }
.tag-live { background: rgba(232,75,75,0.2); color: var(--live); }
.tag-pen  { background: rgba(201,145,58,0.2); color: var(--gold2); }
.tag-aet  { background: rgba(100,70,150,0.2); color: #a88fd4; }

/* ── Standings ── */
.standings-wrap { display: flex; flex-direction: column; gap: 10px; }
.grp-block {}
.grp-head {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold2);
  background: var(--panel3);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 5px 5px 0 0;
  padding: 5px 10px;
}
.grp-table {
  width: 100%;
  border-collapse: collapse;
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 5px 5px;
  overflow: hidden;
}
.grp-table th {
  font-family: 'Oswald', sans-serif;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 4px 7px;
  text-align: center;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
}
.grp-table th.left { text-align: left; }
.grp-table td {
  padding: 5px 7px;
  text-align: center;
  font-size: 11px;
  color: var(--dim);
  border-bottom: 1px solid rgba(255,255,255,0.025);
}
.grp-table tr:last-child td { border-bottom: none; }
.grp-table tr.q1 td { background: rgba(46,125,82,0.07); }
.grp-table tr.q2 td { background: rgba(46,125,82,0.04); }
.grp-table tr.q3 td { background: rgba(201,145,58,0.04); }
.td-pos {
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  width: 18px;
}
.td-team {
  display: flex;
  align-items: center;
  gap: 5px;
  text-align: left;
  font-size: 12px;
  color: var(--text);
}
.td-team .flag { font-size: 13px; }
.td-pts {
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
}
.form-row { display: flex; gap: 2px; justify-content: center; align-items: center; }
.form-pip {
  width: 6px; height: 6px;
  border-radius: 50%;
}
.pip-W { background: var(--win-text); }
.pip-D { background: var(--draw-text); }
.pip-L { background: var(--loss-text); }

.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="trophy-wrap">🏆</div>
    <div class="title-block">
      <div class="t1">World Cup 2026</div>
      <div class="t2">Jun 11 – Jul 19 &nbsp;·&nbsp; USA · Canada · Mexico</div>
    </div>
  </div>
  <div class="header-right">
    <span class="updated" id="updated-ts"></span>
    <button class="refresh-btn" onclick="init()">↺ Refresh</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('fixtures',this)">Fixtures</button>
  <button class="tab" onclick="switchTab('standings',this)">Standings</button>
</div>

<div class="content">
  <div id="view-fixtures" class="view active">
    <div class="round-filter" id="round-filter"></div>
    <div id="fixtures-out"><div class="state"><div class="spinner"></div><div class="state-label">Loading…</div></div></div>
  </div>
  <div id="view-standings" class="view">
    <div id="standings-out"><div class="state"><div class="spinner"></div><div class="state-label">Loading…</div></div></div>
  </div>
</div>

<script>
// ── Country → flag emoji ──────────────────────────────────────────────────────
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿','Czechia':'🇨🇿',
  'Canada':'🇨🇦','Bosnia & Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷','Turkey':'🇹🇷',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Germany':'🇩🇪','Curaçao':'🇨🇼',
  'Sweden':'🇸🇪','Tunisia':'🇹🇳','Ivory Coast':'🇨🇮',"Côte d'Ivoire":'🇨🇮',
  'Ecuador':'🇪🇨','Spain':'🇪🇸','Cape Verde':'🇨🇻','Belgium':'🇧🇪','Egypt':'🇪🇬',
  'Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷',
  'Ghana':'🇬🇭','Panama':'🇵🇦','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
};
function flag(name) { return FLAGS[name] || '🏳️'; }

// ── UTC offset → numeric minutes ─────────────────────────────────────────────
function parseOffset(timeStr) {
  // e.g. "13:00 UTC-6" → -360
  const m = (timeStr||'').match(/UTC([+-]\d+)/);
  return m ? parseInt(m[1]) * 60 : 0;
}

function matchLocalTime(match) {
  // parse date + time + UTC offset into a JS Date
  const [h, minPart] = (match.time||'00:00').split(' ')[0].split(':').map(Number);
  const offsetMins = parseOffset(match.time);
  const utcMs = Date.parse(match.date + 'T' + String(h).padStart(2,'0') + ':' + String(minPart).padStart(2,'0') + ':00Z') - offsetMins * 60000;
  return new Date(utcMs);
}

function fmtTime(d) {
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function isToday(d) {
  const now = new Date();
  return d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth() && d.getDate()===now.getDate();
}
function isPast(d) { return d < new Date(); }

// ── Round label helpers ───────────────────────────────────────────────────────
function roundLabel(r) {
  if (!r) return '';
  if (r.startsWith('Matchday')) return r.replace('Matchday ','MD');
  if (r === 'Round of 32') return 'R32';
  if (r === 'Round of 16') return 'R16';
  if (r === 'Quarter-final') return 'QF';
  if (r === 'Semi-final') return 'SF';
  if (r === 'Match for third place') return '3rd';
  if (r === 'Final') return 'F';
  return r;
}
function roundTabLabel(r) {
  if (!r) return '';
  if (r.startsWith('Matchday')) {
    // group matchdays into Group Stage bucket
    const n = parseInt(r.split(' ')[1]);
    if (n <= 7) return 'Grp MD1';
    if (n <= 13) return 'Grp MD2';
    return 'Grp MD3';
  }
  return { 'Round of 32':'Round of 32','Round of 16':'Round of 16','Quarter-final':'Quarterfinals','Semi-final':'Semifinals','Match for third place':'3rd Place','Final':'Final' }[r] || r;
}

// ── Score display ─────────────────────────────────────────────────────────────
function scoreHtml(match, localDate) {
  const s = match.score;
  if (s) {
    const h = s.ft ? s.ft[0] : (s.ht ? s.ht[0] : '?');
    const a = s.ft ? s.ft[1] : (s.ht ? s.ht[1] : '?');
    const pen = s.pen ? ` <span style="font-size:9px;color:var(--gold);font-family:'Source Sans 3';">(${s.pen[0]}–${s.pen[1]} pen)</span>` : '';
    const aet = s.et  ? ` <span style="font-size:9px;color:#a88fd4;font-family:'Source Sans 3';">AET</span>` : '';
    return `<div class="m-score">${h}<span class="score-sep">–</span>${a}${pen}${aet}</div>`;
  }
  // live check
  if (isPast(localDate) && isToday(localDate)) {
    return `<div class="m-score"><span class="live-dot"></span>Live</div>`;
  }
  return `<div class="m-score upcoming">${fmtTime(localDate)}</div>`;
}

function statusTag(match, localDate) {
  if (match.score?.ft) return '<span class="status-tag tag-ft">FT</span>';
  if (match.score?.pen) return '<span class="status-tag tag-pen">Pen</span>';
  if (match.score?.et)  return '<span class="status-tag tag-aet">AET</span>';
  if (isPast(localDate) && isToday(localDate)) return '<span class="status-tag tag-live">Live</span>';
  return '';
}

function isWinner(match, side) {
  const s = match.score;
  if (!s?.ft) return false;
  if (s.pen) return side === 'home' ? s.pen[0] > s.pen[1] : s.pen[1] > s.pen[0];
  return side === 'home' ? s.ft[0] > s.ft[1] : s.ft[1] > s.ft[0];
}

// ── Group detection ───────────────────────────────────────────────────────────
function groupLabel(match) {
  if (match.group) return match.group.replace('Group ','');
  return roundLabel(match.round);
}

// ── State ─────────────────────────────────────────────────────────────────────
let allMatches = [];
let activeRoundKey = 'all';

// ── Fixtures rendering ────────────────────────────────────────────────────────
function renderFixtures() {
  const now = new Date();

  // filter by round bucket
  let matches = allMatches;
  if (activeRoundKey !== 'all') {
    matches = allMatches.filter(m => roundTabLabel(m.round) === activeRoundKey);
  }

  if (!matches.length) {
    document.getElementById('fixtures-out').innerHTML = '<div class="state"><div class="state-label">No matches</div></div>';
    return;
  }

  // group by local date string
  const byDate = {};
  matches.forEach(m => {
    const ld = matchLocalTime(m);
    const dk = fmtDate(ld);
    if (!byDate[dk]) byDate[dk] = { label: dk, today: isToday(ld), matches: [] };
    byDate[dk].matches.push({ m, ld });
  });

  let html = '';
  for (const { label, today, matches: dayMatches } of Object.values(byDate)) {
    const todayClass = today ? ' today-hdr' : '';
    const todayNote = today ? ' <span style="font-size:8px;background:rgba(58,92,158,0.3);color:#6fa3e8;padding:1px 5px;border-radius:3px;font-family:Oswald,sans-serif;letter-spacing:0.5px">TODAY</span>' : '';
    html += `<div class="date-section"><div class="date-hdr${todayClass}">${label}${todayNote}</div>`;
    dayMatches.forEach(({ m, ld }) => {
      const done = !!m.score?.ft;
      const live = !done && isPast(ld) && isToday(ld);
      const cls  = live ? 'is-live' : (done ? 'is-done' : (today ? 'is-today' : ''));
      const hw   = isWinner(m, 'home') ? ' winner' : '';
      const aw   = isWinner(m, 'away') ? ' winner' : '';
      const f1   = flag(m.team1);
      const f2   = flag(m.team2);
      const city = (m.ground||'').replace(/\s*\(.*?\)/g,'').trim();
      html += `<div class="match ${cls}">
        <div class="m-grp">${groupLabel(m)}</div>
        <div class="m-team${hw}"><span class="flag">${f1}</span><span class="name">${m.team1}</span></div>
        ${scoreHtml(m, ld)}
        <div class="m-team away${aw}"><span class="name">${m.team2}</span><span class="flag">${f2}</span></div>
        <div class="m-meta">${city ? `<div class="city">${city}</div>` : ''}${statusTag(m, ld)}</div>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('fixtures-out').innerHTML = html;
}

// ── Round filter ──────────────────────────────────────────────────────────────
function buildRoundFilter() {
  const buckets = ['all'];
  const seen = new Set();
  allMatches.forEach(m => {
    const b = roundTabLabel(m.round);
    if (!seen.has(b)) { seen.add(b); buckets.push(b); }
  });
  let html = '';
  buckets.forEach(b => {
    const label = b === 'all' ? 'All' : b;
    const active = b === activeRoundKey ? ' active' : '';
    html += `<button class="rf-btn${active}" onclick="setRound('${b}',this)">${label}</button>`;
  });
  document.getElementById('round-filter').innerHTML = html;
}

function setRound(key, btn) {
  activeRoundKey = key;
  document.querySelectorAll('.rf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFixtures();
}

// ── Standings ─────────────────────────────────────────────────────────────────
function buildStandings() {
  // derive standings from match results
  const teams = {}; // key: "GroupX|TeamName"

  function ensureTeam(group, name) {
    const key = group + '|' + name;
    if (!teams[key]) teams[key] = { group, name, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0, form:[] };
    return teams[key];
  }

  allMatches.forEach(m => {
    if (!m.group || !m.score?.ft) return;
    const h = ensureTeam(m.group, m.team1);
    const a = ensureTeam(m.group, m.team2);
    const [hg, ag] = m.score.ft;
    // use pen if available for W/L
    let hw, aw;
    if (m.score.pen) { hw = m.score.pen[0] > m.score.pen[1]; aw = !hw; }
    else { hw = hg > ag; aw = ag > hg; }
    const draw = hg === ag && !m.score.pen;

    h.p++; a.p++;
    h.gf += hg; h.ga += ag;
    a.gf += ag; a.ga += hg;

    if (draw)      { h.d++; a.d++; h.pts+=1; a.pts+=1; h.form.push('D'); a.form.push('D'); }
    else if (hw)   { h.w++; a.l++; h.pts+=3;            h.form.push('W'); a.form.push('L'); }
    else           { a.w++; h.l++; a.pts+=3;            h.form.push('L'); a.form.push('W'); }
  });

  // group by group name
  const groups = {};
  Object.values(teams).forEach(t => {
    if (!groups[t.group]) groups[t.group] = [];
    groups[t.group].push(t);
  });

  // if no results yet, build skeleton from matches
  if (!Object.keys(groups).length) {
    allMatches.forEach(m => {
      if (!m.group) return;
      if (!groups[m.group]) groups[m.group] = {};
      [m.team1, m.team2].forEach(name => {
        if (!groups[m.group][name])
          groups[m.group][name] = { group:m.group, name, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0, form:[] };
      });
    });
    Object.keys(groups).forEach(g => groups[g] = Object.values(groups[g]));
  }

  // sort each group
  const sortedGroupNames = Object.keys(groups).sort();
  sortedGroupNames.forEach(g => {
    groups[g].sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdA = a.gf - a.ga, gdB = b.gf - b.ga;
      if (gdB !== gdA) return gdB - gdA;
      return b.gf - a.gf;
    });
  });

  // render
  let html = '<div class="standings-wrap">';
  sortedGroupNames.forEach(g => {
    html += `<div class="grp-block">
      <div class="grp-head">${g}</div>
      <table class="grp-table">
        <thead><tr>
          <th class="left" style="width:18px">#</th>
          <th class="left">Team</th>
          <th>P</th><th>W</th><th>D</th><th>L</th>
          <th>GD</th><th class="td-pts">Pts</th><th>Form</th>
        </tr></thead><tbody>`;
    groups[g].forEach((t,i) => {
      const qc = i===0 ? 'q1' : i===1 ? 'q2' : i===2 ? 'q3' : '';
      const gd = t.gf - t.ga;
      const formHtml = t.form.slice(-5).map(f => `<div class="form-pip pip-${f}"></div>`).join('');
      html += `<tr class="${qc}">
        <td class="td-pos">${i+1}</td>
        <td><div class="td-team"><span class="flag">${flag(t.name)}</span>${t.name}</div></td>
        <td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td style="color:${gd>0?'var(--win-text)':gd<0?'var(--loss-text)':'var(--muted)'}">${gd>0?'+':''}${gd}</td>
        <td class="td-pts">${t.pts}</td>
        <td><div class="form-row">${formHtml}</div></td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });
  html += '</div>';

  if (sortedGroupNames.length === 0) {
    html = '<div class="state"><div class="state-label">No group data yet</div></div>';
  }

  document.getElementById('standings-out').innerHTML = html;
}

// ── Tab switch ────────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('fixtures-out').innerHTML = '<div class="state"><div class="spinner"></div><div class="state-label">Loading…</div></div>';
  document.getElementById('standings-out').innerHTML = '<div class="state"><div class="spinner"></div><div class="state-label">Loading…</div></div>';
  document.getElementById('round-filter').innerHTML = '';

  try {
    const url = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
    const r = await fetch(url + '?_=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allMatches = data.matches || [];

    // sort by date
    allMatches.sort((a,b) => matchLocalTime(a) - matchLocalTime(b));

    buildRoundFilter();
    renderFixtures();
    buildStandings();

    const now = new Date();
    document.getElementById('updated-ts').textContent =
      'Updated ' + now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});

  } catch(e) {
    const err = `<div class="state"><div class="state-label">⚠ Failed to load</div><div style="font-size:9px;color:var(--muted);margin-top:6px">${e.message}</div></div>`;
    document.getElementById('fixtures-out').innerHTML = err;
    document.getElementById('standings-out').innerHTML = err;
  }
}

init();
// Auto-refresh every 5 min
setInterval(init, 5 * 60 * 1000);
</script>

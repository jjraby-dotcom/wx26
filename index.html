<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup DAKboard</title>
    <script type="module" src="https://unpkg.com/@api-sports/api-football-widgets@3.0.0/dist/api-football-widgets/api-football-widgets.esm.js"></script>
    <script nomodule src="https://unpkg.com/@api-sports/api-football-widgets@3.0.0/dist/api-football-widgets/api-football-widgets.js"></script>
    
    <style>
        /* Dark theme styling optimized for DAKboard screens */
        body {
            background-color: transparent; 
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .widget-container {
            width: 100%;
            max-width: 480px; /* Adjust this to perfectly match your DAKboard block width */
        }
        h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaaaaa;
            border-bottom: 1px solid #333333;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <div id="wg-api-football-config" 
         data-key="YOUR_API_SPORTS_KEY_HERE" 
         data-theme="dark" 
         data-refresh="60"> 
    </div>

    <div class="widget-container">
        <h3>World Cup Schedule & Scores</h3>
        <div id="wg-api-football-fixtures" 
             data-league="1" 
             data-season="2026"
             data-last="10"
             data-next="10">
        </div>
    </div>

    <div class="widget-container">
        <h3>Group Standings</h3>
        <div id="wg-api-football-standings" 
             data-league="1" 
             data-season="2026">
        </div>
    </div>

</body>
</html>
